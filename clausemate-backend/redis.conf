# Redis configuration for Clausemate production deployment.
#
# ════════════════════════════════════════════════════════════════
#  PRODUCTION REQUIREMENT — READ BEFORE DEPLOYING
# ════════════════════════════════════════════════════════════════
#
# This application uses BullMQ backed by Redis as its durable job queue.
# If Redis restarts WITHOUT persistence enabled, ALL queued and in-flight
# analysis jobs are silently and permanently lost. When that happens:
#
#   1. Users submit contracts, receive a "queued" status, and never get
#      results — the job simply no longer exists in Redis.
#
#   2. credit_reservations rows remain stuck in "reserved" state until
#      the stale-reservation sweeper runs (default: every hour).
#      Until then, users see artificially reduced credit balances.
#
# AOF (Append-Only File) persistence MUST be enabled on the Redis
# instance that serves this application. The startup health check
# (src/services/redisCheck.ts) will log a CRITICAL error on boot
# if appendonly is not set to yes.
#
# The stale reservation sweeper (src/services/staleReservationSweeper.ts)
# is a RECOVERY mechanism, not a substitute for persistence. It only
# runs on a delay and cannot recover jobs — only credits.
#
# ════════════════════════════════════════════════════════════════

# ── AOF Persistence ────────────────────────────────────────────
#
# appendonly yes    — Enables AOF. Every write command is logged to the
#                     AOF file before being acknowledged to the client.
#                     On restart, Redis replays the AOF to reconstruct
#                     the full dataset, including all BullMQ job keys.
#
# appendfsync everysec — Syncs the AOF buffer to disk once per second.
#                     This means at most 1 second of writes can be lost
#                     on a hard crash. The alternative "always" syncs
#                     on every write (safest but significantly slower);
#                     "no" leaves syncing to the OS (fastest, least safe).
#                     "everysec" is the recommended production setting.

appendonly yes
appendfsync everysec

# Do not pause AOF fsync during an AOF rewrite — prevents latency spikes
# under heavy write load at the cost of slightly less rewrite performance.
no-appendfsync-on-rewrite no

# Trigger an AOF rewrite (compaction) when the AOF file has grown 100%
# over the size of the last rewrite AND is at least 64 MB.
# This keeps the AOF file from growing without bound.
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── RDB Snapshots (secondary backup) ─────────────────────────
#
# RDB snapshots are kept as a secondary recovery path. AOF is the primary.
# On a clean shutdown Redis always writes an RDB file; on crash recovery
# the AOF is used (it is more up-to-date than the last snapshot).

save 900 1
save 300 10
save 60 10000

# ── Memory Policy ─────────────────────────────────────────────
#
# noeviction: refuse write commands when maxmemory is reached rather than
# silently deleting BullMQ job keys. This surfaces memory pressure as an
# error (Redis returns OOM) rather than as mysterious job loss.
#
# Set maxmemory to a value appropriate for your instance size, e.g. 512mb.
# Leave it unset (unlimited) only if your Redis host has guaranteed headroom.

maxmemory-policy noeviction
# maxmemory 512mb

# ── Connections ────────────────────────────────────────────────

# Allow up to 100 simultaneous client connections.
# BullMQ uses a small pool internally; increase if running many workers.
maxclients 100

# ── Logging ───────────────────────────────────────────────────

loglevel notice
